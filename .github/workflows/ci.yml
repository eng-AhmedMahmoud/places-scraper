name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: eng-AhmedMahmoud/devya-workflows/.github/workflows/node-quality.yml@v1
    with:
      package-manager: pnpm
      build-command: pnpm run build
      # Stack Auth needs these at build time; IDs are repo VARIABLES
      # (NEXT_PUBLIC_* — public by definition, shipped in client JS anyway).
      # The server key only needs to be PRESENT for page-data collection —
      # a dummy satisfies it; no API call is made during build.
      env-lines: |
        NEXT_PUBLIC_HEXCLAVE_API_URL=${{ vars.NEXT_PUBLIC_HEXCLAVE_API_URL }}
        NEXT_PUBLIC_HEXCLAVE_PROJECT_ID=${{ vars.NEXT_PUBLIC_HEXCLAVE_PROJECT_ID }}
        HEXCLAVE_SECRET_SERVER_KEY=dummy-ci-server
        STACK_SECRET_SERVER_KEY=dummy-ci-server
  security:
    uses: eng-AhmedMahmoud/devya-workflows/.github/workflows/node-security.yml@v1
    with:
      package-manager: pnpm
