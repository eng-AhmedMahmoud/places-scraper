name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: eng-AhmedMahmoud/devya-workflows/.github/workflows/node-quality.yml@v1
    with:
      package-manager: pnpm
      # build-command intentionally omitted: `next build` needs Stack Auth env
      # (NEXT_PUBLIC_HEXCLAVE_PROJECT_ID) at build time. Enable once the repo
      # variables exist:
      #   build-command: pnpm run build
  security:
    uses: eng-AhmedMahmoud/devya-workflows/.github/workflows/node-security.yml@v1
    with:
      package-manager: pnpm
